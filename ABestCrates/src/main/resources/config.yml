config-version: 2

metrics:
  enabled: true
  # Set this to the bStats plugin id assigned to ABestCrates after registering the project.
  plugin-id: 0

# Opening sounds. Use Bukkit sound names; set enabled to false to disable a phase.
sounds:
  opening:
    cycle:
      enabled: true
      name: UI_BUTTON_CLICK
      volume: 0.7
      pitch: 1.4
    slow:
      enabled: true
      name: BLOCK_NOTE_BLOCK_PLING
      volume: 0.9
      pitch: 1.0
    finish:
      enabled: true
      name: ENTITY_PLAYER_LEVELUP
      volume: 1.0
      pitch: 1.25

# Each player sees only their own virtual key balance below a crate hologram.
virtual-key-display:
  enabled: true
  line: '&eVirtual Keys: &f%keys%'
  height: 1.05

particles:
  tick-interval: 2
  view-distance: 32

mass-open:
  max-at-once: 1000
  batch-size: 5
  batch-delay-ticks: 1

animations:
  # How long Casino shows all nine stopped candidates before removing losing slots.
  casino-final-hold-ticks: 30

# A reward's effective chance is: weight * rarity multiplier.
# Names are case-insensitive and custom rarity names default to 1.0.
rarities:
  common:
    multiplier: 1.0
  uncommon:
    multiplier: 0.75
  rare:
    multiplier: 0.45
  epic:
    multiplier: 0.2
  legendary:
    multiplier: 0.08
