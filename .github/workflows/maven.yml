name: Build

on:
  push:
    branches:
      - main
      - "1.20"
  pull_request:
    branches:
      - main
      - "1.20"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Java ${{ (github.ref_name == '1.20' || github.base_ref == '1.20') && '17' || '21' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ABestCrates

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ (github.ref_name == '1.20' || github.base_ref == '1.20') && '17' || '21' }}
          cache: maven
          cache-dependency-path: ABestCrates/pom.xml

      - name: Build and test
        run: mvn --batch-mode --no-transfer-progress clean verify

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: ABestCrates-java${{ (github.ref_name == '1.20' || github.base_ref == '1.20') && '17' || '21' }}-${{ github.run_id }}
          path: ABestCrates/target/*.jar
          if-no-files-found: error
          retention-days: 14
